# Coin — Levels.fyi comp seed
# Source: Levels.fyi (manual curation). Quarterly refresh required.
# Run `/coin levels-refresh` to walk through stale entries.
#
# Bands are USD. base_p* are annual base salary at the level.
# rsu_4yr_p50 is the median 4-year RSU grant total (NOT annualized).
# Stored as stock_per_year_p50 × 4, since Levels.fyi exposes the
# annualized stock value. impute_comp divides by 4 to recover that.
# bonus_p50 is the target annual bonus.
#
# Levels keys: L4, L5, L6, staff, principal, director, vp.
# Use whichever rungs the company's actual ladder publishes.
#
# Honesty note (2026-04-28): Levels.fyi free-tier pages only expose
# component-level breakdowns for a subset of (company, role-family,
# level) cells. p25 / p75 are not exposed. When Levels gives only the
# median, this seed stores `base_p25 == base_p50 == base_p75`. That is
# a deliberate "no-spread" point estimate, not a fabricated band. The
# scoring layer collapses comp_min/comp_max accordingly and applies a
# confidence haircut (see careerops/score.py::score_comp).
#
# Companies with `unknown: true` were checked and have no usable
# Levels.fyi presence. They are seeded so the lookup function can
# return `None` honestly instead of the auto-impute hook silently
# skipping them.
companies:

  # ── Verified-with-Levels (component breakdown available) ───────────
  Datadog:
    last_refreshed: 2026-04-28
    source_url: https://www.levels.fyi/companies/datadog/salaries
    levels:
      # Senior Software Engineer (L3) — Levels: $246K base, $189K stock/yr, $1.4K bonus
      L5:
        base_p25: 246000
        base_p50: 246000
        base_p75: 246000
        rsu_4yr_p50: 756000
        bonus_p50: 1400
